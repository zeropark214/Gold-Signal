<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gold Signal</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="앱 내비게이션">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">G</div>
          <div>
            <strong>Gold Signal</strong>
            <span>실시간 금속 뉴스 터미널</span>
          </div>
        </div>

        <nav class="nav" aria-label="주요 화면">
          <button class="nav-button active" data-view="dashboard" type="button"><span aria-hidden="true">●</span> 홈</button>
          <button class="nav-button" data-view="indicators" type="button"><span aria-hidden="true">◆</span> 지표</button>
          <button class="nav-button" data-view="news" type="button"><span aria-hidden="true">▲</span> 뉴스</button>
          <button class="nav-button" data-view="community" type="button"><span aria-hidden="true">■</span> 커뮤니티</button>
        </nav>

        <section class="side-section">
          <span class="section-label">오늘의 신호</span>
          <strong id="sideSignal">실질금리 상승, 달러 강세</strong>
          <p>단기 금 가격에는 부담 요인이 우세합니다.</p>
        </section>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">실시간 금속 모니터</p>
            <h1 id="pageTitle">대시보드</h1>
          </div>
        </header>

        <section class="view active" id="dashboardView" aria-labelledby="dashboardTitle">
          <h2 id="dashboardTitle" class="sr-only">대시보드</h2>
          <section class="panel home-index-panel market-price-panel">
            <div class="gold-detail-card" id="goldDetailCard"></div>
            <div class="home-index-list" id="marketBoard"></div>
          </section>

        </section>

        <section class="view" id="indicatorsView" aria-labelledby="indicatorsTitle">
          <h2 id="indicatorsTitle" class="sr-only">경제 지표</h2>
          <div class="indicator-page-list">
            <section class="panel home-index-panel market-price-panel indicator-group-panel" aria-labelledby="dailyIndicatorTitle">
              <h3 class="indicator-group-title" id="dailyIndicatorTitle">매일 봐야 할 지표</h3>
              <div class="home-index-list" id="dailyIndicatorList"></div>
            </section>
            <section class="panel home-index-panel market-price-panel indicator-group-panel" aria-labelledby="monthlyIndicatorTitle">
              <h3 class="indicator-group-title" id="monthlyIndicatorTitle">매월 봐야 할 지표</h3>
              <div class="home-index-list" id="monthlyIndicatorList"></div>
            </section>
          </div>
        </section>

        <section class="view" id="newsView" aria-labelledby="newsTitle">
          <div class="view-heading">
            <h2 id="newsTitle" class="sr-only">금 시장 뉴스</h2>
            <label class="toggle-row">
              <input id="pushToggle" type="checkbox" checked>
              <span>중요 뉴스 푸시</span>
            </label>
          </div>
          <section class="panel news-feed-panel">
            <div class="news-list simple" id="newsList"></div>
          </section>
        </section>

        <section class="view" id="newsDetailView" aria-labelledby="newsDetailTitle">
          <section class="depth-screen news-detail-screen">
            <div class="depth-top">
              <button class="depth-back-button" id="newsBackButton" type="button" aria-label="뉴스 목록으로 돌아가기">‹</button>
              <h2 id="newsDetailTitle">뉴스 상세</h2>
            </div>
            <article class="panel news-detail-panel" id="newsDetailPanel"></article>
          </section>
        </section>

        <section class="view" id="communityView" aria-labelledby="communityTitle">
          <h2 id="communityTitle" class="sr-only">금 투자자 커뮤니티</h2>
          <section class="panel community-feed-panel">
            <div class="community-feed-toolbar">
              <button class="feed-sort-button active" id="sortToggleButton" type="button">
                <span id="sortMenuLabel">최신순</span>
                <span aria-hidden="true">↕</span>
              </button>
              <button class="feed-profile-button" id="profileButton" type="button">내 프로필</button>
            </div>
            <div class="post-list" id="postList"></div>
            <div class="community-composer">
              <div class="composer-avatar" id="composerAvatar" aria-hidden="true">金</div>
              <button class="composer-input" id="communityWriteButton" type="button">무슨 생각을 하고 있나요?</button>
            </div>
          </section>
        </section>

        <section class="view" id="profileView" aria-labelledby="profileTitle">
          <section class="depth-screen profile-screen">
            <div class="depth-top">
              <button class="depth-back-button" id="profileBackButton" type="button" aria-label="커뮤니티로 돌아가기">‹</button>
              <h2 id="profileTitle">마이페이지</h2>
            </div>
            <section class="panel profile-panel">
              <div class="profile-card">
                <div class="profile-avatar" id="profileAvatar" aria-hidden="true">金</div>
                <div class="profile-main">
                  <span class="section-label">내 프로필</span>
                  <strong id="profileNickname">gold_user</strong>
                  <p>커뮤니티에 글과 댓글을 남길 때 이 닉네임이 노출됩니다.</p>
                </div>
                <button class="secondary-button" id="profileEditButton" type="button">프로필 편집</button>
              </div>
              <div class="profile-activity">
                <section aria-labelledby="profileActivityTitle">
                  <h3 id="profileActivityTitle">최근 활동</h3>
                  <div class="activity-list" id="profileActivityArchive"></div>
                </section>
              </div>
            </section>
          </section>
        </section>

        <section class="view" id="profileEditView" aria-labelledby="profileEditTitle">
          <section class="depth-screen profile-edit-screen">
            <div class="depth-top">
              <button class="depth-back-button" id="profileEditCancelButton" type="button" aria-label="마이페이지로 돌아가기">‹</button>
              <h2 id="profileEditTitle">프로필 편집</h2>
            </div>
            <form class="profile-edit-form" id="profileEditForm">
              <label class="profile-image-picker" for="profileAvatarInput">
                <span class="profile-avatar profile-edit-avatar" id="profileEditAvatarPreview" aria-hidden="true">金</span>
                <span class="profile-image-edit" aria-hidden="true">✎</span>
                <input class="profile-image-input" id="profileAvatarInput" type="file" accept="image/*">
              </label>
              <label class="profile-nickname-field">
                <span>닉네임</span>
                <input id="profileNicknameInput" type="text" maxlength="20" required>
              </label>
              <button class="primary-button profile-save-button" type="submit">저장</button>
            </form>
          </section>
        </section>
      </main>
    </div>

    <dialog class="modal" id="postModal">
      <form method="dialog" class="modal-body" id="postForm">
        <div class="panel-header">
          <div>
            <span class="section-label">Community</span>
            <h3>새 글 작성</h3>
          </div>
          <button class="icon-button" value="cancel" type="submit" aria-label="닫기" title="닫기">×</button>
        </div>
        <label>
          토론방
          <select id="postRoom" required></select>
        </label>
        <label>
          제목
          <input id="postTitle" type="text" maxlength="80" required placeholder="제목을 입력하세요">
        </label>
        <label>
          본문
          <textarea id="postBody" rows="5" required placeholder="의견을 입력하세요"></textarea>
        </label>
        <div class="modal-actions">
          <button class="secondary-button" value="cancel" type="submit">취소</button>
          <button class="primary-button" id="submitPost" value="default" type="submit">등록</button>
        </div>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
